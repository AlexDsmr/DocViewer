<div
  class="page-annotation"
  [class.page-annotation--edit]="mode() === 'edit'"
  [class.page-annotation--active]="isActive()"
  [style.left.%]="annotation().x * 100"
  [style.top.%]="annotation().y * 100"
  appMovable
  data-pan-ignore="true"
  [disabled]="mode() !== 'edit'"
  (dblclick)="onDoubleClick()"
  (moveDelta)="onMove($event)"
>
  @if (mode() === 'edit') {
    <div class="page-annotation__toolbar">
      <app-button
        aria-label="Delete annotation"
        size="compact"
        variant="ghost"
        (click)="onDelete()"
      >
        x
      </app-button>
    </div>

    <textarea
      #textarea
      class="page-annotation__editor"
      [value]="annotation().description"
      (blur)="onTextBlur()"
      (input)="onTextChange($any($event.target).value)"
      (keydown)="onTextKeydown($event)"
    ></textarea>
  } @else {
    <p class="page-annotation__text">{{ annotation().description }}</p>
  }
</div>
